<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Habit Tracker System - Editable Version</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --panel-bg: #1c1c24;
            --text-main: #f0f0f0;
            --text-muted: #8b92a5;
            --border-color: #333333;
            --accent: #4a90e2;
            --cell-bg: #131318;
            --row-hover: #252530;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 1450px;
            background-color: var(--panel-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        /* Top Charts Section */
        .top-section { display: flex; gap: 20px; margin-bottom: 20px; }
        .chart-container { background: var(--cell-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        .daily-container { flex: 3; }
        .weekly-container { flex: 1; }
        
        .chart-title { text-align: center; font-size: 14px; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;}
        
        .bar-chart { display: flex; align-items: flex-end; justify-content: space-between; height: 120px; gap: 3px; }
        .daily-chart-bars { padding-left: 200px; } 
        
        .bar-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%;}
        .bar { width: 100%; height: 100%; background-color: #2a2a35; position: relative; border-radius: 2px 2px 0 0; }
        .bar-fill { position: absolute; bottom: 0; width: 100%; background-color: #5b6275; transition: height 0.4s ease; border-radius: 2px 2px 0 0; }
        .week-label { font-size: 10px; color: var(--text-muted); margin-top: 5px; }

        /* Main Grid Section */
        .grid-wrapper { display: flex; overflow-x: auto; border: 1px solid var(--border-color); border-radius: 8px; background: var(--cell-bg); margin-bottom: 20px; }
        .left-panel { min-width: 200px; position: sticky; left: 0; background: var(--panel-bg); z-index: 10; border-right: 2px solid var(--border-color); }
        .right-panel { display: flex; flex-direction: column; }

        .row { display: flex; height: 32px; align-items: center; border-bottom: 1px solid #2a2a35; }
        .habit-name { width: 100%; padding-left: 15px; font-size: 13px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; padding-right: 10px;}
        
        /* Edit Button Style */
        .edit-btn { font-size: 10px; padding: 3px 6px; background: #2a2a35; border-radius: 4px; cursor: pointer; color: var(--text-muted); transition: 0.2s;}
        .edit-btn:hover { background: #4a90e2; color: #fff; }

        .header-row { background: #252530; height: auto; flex-direction: column; align-items: flex-start; }
        .weeks, .days, .dates { display: flex; width: 100%; }
        .weeks div, .days div, .dates div, .cell { min-width: 28px; display: flex; justify-content: center; align-items: center; font-size: 11px; border-right: 1px solid var(--border-color); }
        
        .weeks div { font-weight: bold; padding: 4px 0; background: #1a1a22; }
        .days div { color: var(--text-muted); padding: 2px 0;}
        .dates div { background: #2a2a35; padding: 2px 0;}
        .cell { height: 32px; background: var(--cell-bg); }

        .row:hover .cell, .row:hover .habit-name { background: var(--row-hover); }

        input[type="checkbox"] { appearance: none; width: 16px; height: 16px; background-color: transparent; border: 1px solid #555; border-radius: 3px; cursor: pointer; }
        input[type="checkbox"]:checked { background-color: #fff; border-color: #fff; position: relative; }
        input[type="checkbox"]:checked::after { content: '✔'; position: absolute; color: #000; font-size: 12px; left: 2px; top: -2px; font-weight: bold; }

        .wellness-header { background: #1a1a22; font-weight: bold; color: var(--text-muted); text-align: center; justify-content: center; font-size: 12px;}

        /* Bottom Section */
        .bottom-section { display: flex; gap: 20px; flex-wrap: wrap; }
        .panel { flex: 1; background: var(--cell-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; min-width: 300px;}
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { text-align: center; padding: 8px; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-muted); }
        
        .overall-stats { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .circular-progress { position: relative; width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(#fff 0%, #333 0%); display: flex; align-items: center; justify-content: center; margin: 10px 0 20px 0; }
        .circular-progress::before { content: ''; position: absolute; width: 90px; height: 90px; background-color: var(--cell-bg); border-radius: 50%; }
        .progress-value { position: relative; font-size: 24px; font-weight: bold; }

        .stats-details { width: 100%; display: flex; justify-content: space-around; font-size: 12px; color: var(--text-muted); text-align: center; }
        .stats-details span { display: block; color: #fff; font-size: 16px; font-weight: bold; margin-top: 5px;}

        .top-list { list-style: none; padding: 0; margin: 0; }
        .top-list li { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid var(--border-color); font-size: 13px;}
        .top-list li:hover { background: var(--row-hover); }
        .rank { font-weight: bold; margin-right: 15px; color: var(--text-muted); width: 15px; display: inline-block;}
    </style>
</head>
<body>

    <div class="dashboard">
        
        <div class="top-section">
            <div class="chart-container daily-container">
                <div class="chart-title">Daily Progress</div>
                <div class="bar-chart daily-chart-bars" id="daily-chart"></div>
            </div>
            
            <div class="chart-container weekly-container">
                <div class="chart-title">Weekly Progress</div>
                <div class="bar-chart" id="weekly-chart"></div>
            </div>
        </div>

        <div class="grid-wrapper">
            <div class="left-panel" id="habit-names">
                <div class="row header-row" style="height: 70px;">
                    <div class="habit-name" style="padding-top: 30px; font-weight: bold; font-size: 16px; justify-content: center;">My Habits</div>
                </div>
            </div>
            <div class="right-panel" id="grid-content">
                <div class="row header-row" id="date-headers" style="height: 70px;"></div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="panel">
                <div class="chart-title">Analysis</div>
                <table>
                    <thead>
                        <tr>
                            <th style="text-align: left;">Habit</th>
                            <th>Goal</th>
                            <th>Actual</th>
                            <th>Left</th>
                            <th>Progress</th>
                        </tr>
                    </thead>
                    <tbody id="analysis-body"></tbody>
                </table>
            </div>

            <div class="panel overall-stats">
                <div class="chart-title">Overall Stats</div>
                <div class="circular-progress" id="circle-bar">
                    <span class="progress-value" id="circle-val">0%</span>
                </div>
                <div class="stats-details">
                    <div>Goal<span id="total-goal">0</span></div>
                    <div>Completed<span id="total-actual">0</span></div>
                    <div>Left<span id="total-left">0</span></div>
                </div>
            </div>

            <div class="panel">
                <div class="chart-title">Top 10 Habits</div>
                <ul class="top-list" id="top-habits-list"></ul>
            </div>
        </div>
    </div>

    <script>
        // Default Habits list
        const defaultHabits = [
            "Stretching 🧘‍♂️",
            "Day Planning 📝",
            "Wake up at 05:00 ⏰",
            "Gym 💪",
            "Reading / Learning 📖",
            "Project Work 🎯",
            "Social Media Detox 🌿",
            "No Alcohol 🚫",
            "Cold Shower 🚿"
        ];
        
        // Load custom habits from localStorage or use defaults
        let habits = JSON.parse(localStorage.getItem('userCustomHabits')) || defaultHabits;
        
        const daysInMonth = 31;
        const totalPossibleChecks = habits.length * daysInMonth;

        function initSystem() {
            renderGrid();
            loadSavedData();
            calculateStats();
        }

        // Function to Edit Habit Name
        function editHabit(index) {
            let currentHabit = habits[index];
            let newHabit = prompt("Navin habit che naav aani emoji taka:", currentHabit);
            
            if (newHabit !== null && newHabit.trim() !== "") {
                habits[index] = newHabit.trim();
                localStorage.setItem('userCustomHabits', JSON.stringify(habits));
                location.reload(); // Page refresh to update all charts and tables
            }
        }

        function renderGrid() {
            const habitNamesContainer = document.getElementById('habit-names');
            const gridContent = document.getElementById('grid-content');
            const dateHeaders = document.getElementById('date-headers');
            const dailyChart = document.getElementById('daily-chart');
            const weeklyChart = document.getElementById('weekly-chart');
            const analysisBody = document.getElementById('analysis-body');

            // Set up headers & charts
            let weeksHTML = '<div class="weeks">';
            let daysHTML = '<div class="days">';
            let datesHTML = '<div class="dates">';
            const dayNames = ['Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa', 'Su'];
            
            for(let i=1; i<=daysInMonth; i++) {
                if(i % 7 === 1) {
                    let weekNum = Math.ceil(i/7);
                    let daysInWeek = Math.min(7, daysInMonth - i + 1);
                    let width = daysInWeek * 29; 
                    weeksHTML += `<div style="min-width: ${width}px; border-bottom: 1px solid #333;">Week ${weekNum}</div>`;
                }
                daysHTML += `<div>${dayNames[(i-1)%7]}</div>`;
                datesHTML += `<div>${i}</div>`;
                
                dailyChart.innerHTML += `<div class="bar-wrapper"><div class="bar"><div class="bar-fill" id="bar-${i}" style="height: 0%;"></div></div></div>`;
            }
            weeksHTML += '</div>'; daysHTML += '</div>'; datesHTML += '</div>';
            dateHeaders.innerHTML = weeksHTML + daysHTML + datesHTML;

            for(let w=1; w<=5; w++) {
                weeklyChart.innerHTML += `
                    <div class="bar-wrapper" style="margin: 0 5px;">
                        <div class="bar"><div class="bar-fill" id="week-bar-${w}" style="height: 0%; background-color: #f0f0f0;"></div></div>
                        <div class="week-label">W${w}</div>
                    </div>`;
            }

            // Set up Habit Rows
            habits.forEach((habit, habitIndex) => {
                habitNamesContainer.innerHTML += `
                    <div class="row">
                        <div class="habit-name">
                            <span>${habit}</span>
                            <span class="edit-btn" onclick="editHabit(${habitIndex})" title="Edit Habit">✏️ Edit</span>
                        </div>
                    </div>`;
                
                let rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                for(let d=1; d<=daysInMonth; d++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerHTML = `<input type="checkbox" data-habit="${habitIndex}" data-day="${d}" onchange="updateSystem()">`;
                    rowDiv.appendChild(cell);
                }
                gridContent.appendChild(rowDiv);

                analysisBody.innerHTML += `
                    <tr id="analysis-row-${habitIndex}">
                        <td style="text-align: left;">${habit}</td>
                        <td>31</td>
                        <td class="a-actual">0</td>
                        <td class="a-left">31</td>
                        <td class="a-progress">0%</td>
                    </tr>
                `;
            });

            // Overall Wellness
            habitNamesContainer.innerHTML += `<div class="row"><div class="habit-name wellness-header">Overall wellness</div></div>`;
            habitNamesContainer.innerHTML += `<div class="row"><div class="habit-name" style="color: #8b92a5; padding-top: 5px;">Mood 🎭</div></div>`;
            
            let emptyRow = document.createElement('div');
            emptyRow.className = 'row';
            emptyRow.innerHTML = `<div style="width: 100%; background: #1a1a22; height: 100%;"></div>`;
            gridContent.appendChild(emptyRow);

            let moodRow = document.createElement('div');
            moodRow.className = 'row';
            for(let d=1; d<=daysInMonth; d++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerHTML = `<input type="text" data-mood="${d}" style="width: 20px; background: transparent; border: none; color: white; text-align: center; font-size: 12px;" placeholder="-" onchange="saveMood()">`;
                moodRow.appendChild(cell);
            }
            gridContent.appendChild(moodRow);
        }

        function updateSystem() {
            saveCheckboxes();
            calculateStats();
        }

        function saveCheckboxes() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            let savedData = {};
            checkboxes.forEach(cb => { savedData[`${cb.dataset.habit}-${cb.dataset.day}`] = cb.checked; });
            localStorage.setItem('proTrackerData', JSON.stringify(savedData));
        }

        function saveMood() {
            const moodInputs = document.querySelectorAll('input[data-mood]');
            let moodData = {};
            moodInputs.forEach(input => { moodData[input.dataset.mood] = input.value; });
            localStorage.setItem('proMoodData', JSON.stringify(moodData));
        }

        function loadSavedData() {
            let savedData = JSON.parse(localStorage.getItem('proTrackerData'));
            if(savedData) {
                const checkboxes = document.querySelectorAll('input[type="checkbox"]');
                checkboxes.forEach(cb => { if(savedData[`${cb.dataset.habit}-${cb.dataset.day}`]) cb.checked = true; });
            }
            let moodData = JSON.parse(localStorage.getItem('proMoodData'));
            if(moodData) {
                const moodInputs = document.querySelectorAll('input[data-mood]');
                moodInputs.forEach(input => { if(moodData[input.dataset.mood]) input.value = moodData[input.dataset.mood]; });
            }
        }

        function calculateStats() {
            let totalActual = 0;
            let habitScores = [];
            
            let weeklyTotals = [0, 0, 0, 0, 0];
            let weeklyPossible = [
                habits.length * 7, 
                habits.length * 7, 
                habits.length * 7, 
                habits.length * 7, 
                habits.length * 3  
            ];

            for(let d=1; d<=daysInMonth; d++) {
                let dayChecks = document.querySelectorAll(`input[data-day="${d}"]:checked`).length;
                
                let dayPercent = (dayChecks / habits.length) * 100;
                document.getElementById(`bar-${d}`).style.height = `${dayPercent}%`;

                let weekIndex = Math.ceil(d / 7) - 1;
                weeklyTotals[weekIndex] += dayChecks;
            }

            for(let w=0; w<5; w++) {
                let weekPercent = (weeklyTotals[w] / weeklyPossible[w]) * 100;
                document.getElementById(`week-bar-${w+1}`).style.height = `${weekPercent}%`;
            }

            habits.forEach((habit, index) => {
                let habitChecks = document.querySelectorAll(`input[data-habit="${index}"]:checked`).length;
                totalActual += habitChecks;
                let progressPercent = Math.round((habitChecks / daysInMonth) * 100);
                
                let row = document.getElementById(`analysis-row-${index}`);
                row.querySelector('.a-actual').innerText = habitChecks;
                row.querySelector('.a-left').innerText = daysInMonth - habitChecks;
                row.querySelector('.a-progress').innerText = progressPercent + '%';

                habitScores.push({ name: habit, score: progressPercent });
            });

            document.getElementById('total-goal').innerText = totalPossibleChecks;
            document.getElementById('total-actual').innerText = totalActual;
            document.getElementById('total-left').innerText = totalPossibleChecks - totalActual;
            
            let overallPercent = Math.round((totalActual / totalPossibleChecks) * 100) || 0;
            document.getElementById('circle-val').innerText = overallPercent + '%';
            document.getElementById('circle-bar').style.background = `conic-gradient(#fff ${overallPercent}%, #333 0%)`;

            habitScores.sort((a, b) => b.score - a.score);
            const topList = document.getElementById('top-habits-list');
            topList.innerHTML = '';
            habitScores.forEach((h, i) => {
                topList.innerHTML += `<li>
                    <div><span class="rank">${i+1}</span> ${h.name}</div>
                    <div style="font-weight: bold; color: #fff;">${h.score}%</div>
                </li>`;
            });
        }

        initSystem();
    </script>
</body>
</html>
